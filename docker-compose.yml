services:
  web-form-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: web-form-server:latest
    container_name: web-form-server
    ports:
      - "${HOST_PORT:-8237}:5000"
    volumes:
      # Form definition and CSS — edit these files without rebuilding the image
      - ./web-config:/web-config:rw
      # Submission JSON files — persists outside the container lifecycle
      - ./data/submissions:/data/submissions:rw
    environment:
      FORM_FILE: /web-config/example.form.toml
      CSS_FILE: /web-config/example.form.css
      PORT: "5000"
      SAVE_SUBMISSIONS: "true"
      SUBMISSIONS_DIR: /data/submissions
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
